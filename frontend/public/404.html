<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ReviewSense Analytics</title>
<script>
  // SPA redirect: store path in sessionStorage,
  // redirect to index.html
  var path = window.location.pathname;
  if (path !== '/') {
    sessionStorage.setItem('redirect', path);
    window.location.replace('/');
  }
</script>
</head>
<body></body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <!-- Single gradient: white core → cyan → transparent halo — no separate layers -->
    <radialGradient id="centre" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="20%"  stop-color="#aaf8ff" stop-opacity="0.95"/>
      <stop offset="45%"  stop-color="#00d9ff" stop-opacity="0.65"/>
      <stop offset="72%"  stop-color="#0055aa" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#001133" stop-opacity="0"/>
    </radialGradient>

    <!-- Ring glow only — NOT applied to the centre orb -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.0" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ring 1: outermost thick segmented arcs -->
  <circle cx="24" cy="24" r="22"
    stroke="#00ccff" stroke-width="2.8" stroke-linecap="round"
    stroke-dasharray="14 4.2" stroke-opacity="0.72" fill="none"
    filter="url(#glow)"/>

  <!-- Ring 1b: thin circuit detail -->
  <circle cx="24" cy="24" r="20"
    stroke="#0088dd" stroke-width="0.9" stroke-linecap="square"
    stroke-dasharray="6 1 2 1 3 2" stroke-opacity="0.42" fill="none"/>

  <!-- Ring 2 -->
  <circle cx="24" cy="24" r="17.5"
    stroke="#00bbee" stroke-width="2.0" stroke-linecap="round"
    stroke-dasharray="10 3 4 3" stroke-opacity="0.68" fill="none"
    filter="url(#glow)"/>

  <!-- Ring 2b: thin detail -->
  <circle cx="24" cy="24" r="15.8"
    stroke="#005599" stroke-width="0.7" stroke-linecap="square"
    stroke-dasharray="5 1 1 2" stroke-opacity="0.38" fill="none"/>

  <!-- Ring 3 -->
  <circle cx="24" cy="24" r="13.5"
    stroke="#00ddff" stroke-width="1.6" stroke-linecap="round"
    stroke-dasharray="8 3" stroke-opacity="0.62" fill="none"
    filter="url(#glow)"/>

  <!-- Ring 4 inner -->
  <circle cx="24" cy="24" r="10.5"
    stroke="#55eeff" stroke-width="1.0" stroke-linecap="round"
    stroke-dasharray="5 2.5" stroke-opacity="0.55" fill="none"
    filter="url(#glow)"/>

  <!-- Ring 4b: thin inner detail -->
  <circle cx="24" cy="24" r="9.2"
    stroke="#0077bb" stroke-width="0.6" stroke-linecap="square"
    stroke-dasharray="3 1 1 1" stroke-opacity="0.36" fill="none"/>

  <!-- Innermost dashed ring -->
  <circle cx="24" cy="24" r="7.0"
    stroke="#00eeff" stroke-width="0.8"
    stroke-dasharray="2.5 2" stroke-opacity="0.60" fill="none"/>

  <!-- ── SINGLE CENTRE ELEMENT: gradient alone handles core + halo ── -->
  <circle cx="24" cy="24" r="6.5" fill="url(#centre)"/>
</svg>

services:
  - type: web
    name: reviewsense-backend
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: >
      uvicorn backend.app.main:app
      --host 0.0.0.0
      --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10"
      - key: PORT
        value: "8000"
    healthCheckPath: /health
